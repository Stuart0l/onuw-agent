# MiniMax-M3 config: all 5 players run on MiniMax's hosted MiniMax-M3 model.
# Uses the OpenAI-compatible endpoint (LiteLLM `openai/` prefix).
#
# Before running:
#   export OPENAI_API_KEY=<your-minimax-bearer-token>
#   export OPENAI_API_BASE=https://api.minimaxi.com/v1
#
# Then:
#   uv run python -m onuw run --config configs/sample_minimax.yaml --god
#
# Notes:
# - json_mode is left at the default (false). If MiniMax-M3 accepts
#   response_format={"type":"json_object"}, you can set json_mode: true
#   per player for stronger output enforcement.
# - The curl example also showed a MiniMax-specific `thinking: {type:
#   "adaptive"}` field. LiteLLM's OpenAI-compatible client doesn't pass
#   that through; if you want to enable thinking-mode, extend LLMClient
#   to forward extra provider-specific kwargs.

discussion_rounds: 3
max_speech_chars: 1200
seed: 37
log_dir: logs
console: true

role_pool:
  - werewolf
  - werewolf
  - seer
  - robber
  - troublemaker
  - mason
  - mason
  - minion

players:
  - id: p1
    name: Alice
    model: openai/MiniMax-M3
    persona: "A cautious librarian who hates being interrupted."
    temperature: 0.7
  - id: p2
    name: Bob
    model: openai/MiniMax-M3
    persona: "A theatrical poker player. Bluffs constantly."
    temperature: 0.7
  - id: p3
    name: Cara
    model: openai/MiniMax-M3
    temperature: 0.7
  - id: p4
    name: Dan
    model: openai/MiniMax-M3
    persona: "Analytical, leans on probabilities."
    temperature: 0.7
  - id: p5
    name: Eve
    model: openai/MiniMax-M3
    persona: "Chaotic gremlin. Loves to accuse people."
    temperature: 0.7
