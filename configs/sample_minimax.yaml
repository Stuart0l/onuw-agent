# MiniMax-M3 config: all 5 players run on MiniMax's hosted MiniMax-M3 model.
# Uses the OpenAI-compatible endpoint (LiteLLM `openai/` prefix).
#
# Before running:
#   export OPENAI_API_KEY=<your-minimax-bearer-token>
#   export OPENAI_API_BASE=https://api.minimaxi.com/v1
#
# Then:
#   uv run python -m onuw run --config configs/sample_minimax.yaml --god
#
# Notes:
# - MiniMax-M3 is a REASONING model: it emits an internal chain-of-thought
#   into a separate response field and only writes the final answer into
#   `content` after thinking finishes. With a small max_tokens budget the
#   model spends everything on thinking and `content` comes back empty
#   (just trailing newlines). max_tokens here is bumped to 8192 to leave
#   room for both reasoning and the final JSON answer.
# - json_mode is left at the default (false). If MiniMax-M3 accepts
#   response_format={"type":"json_object"}, you can set json_mode: true
#   per player for stronger output enforcement.
# - `extra_body` is forwarded verbatim into the upstream request body.
#   MiniMax-M3's `thinking.type` only accepts "disabled" or "adaptive"
#   (no thinking-budget knob). "disabled" skips reasoning entirely —
#   far faster, but loses chain-of-thought quality. "adaptive" lets the
#   model decide and can be slow. Flip the value per seat below.

discussion_rounds: 3
max_speech_chars: 1200
seed: 37
log_dir: logs
console: true

role_pool:
  - werewolf
  - werewolf
  - seer
  - robber
  - troublemaker
  - mason
  - mason
  - minion

players:
  - id: p1
    name: Alice
    model: openai/MiniMax-M3
    temperature: 0.7
    max_tokens: 8192
    extra_body:
      thinking:
        type: disabled
  - id: p2
    name: Bob
    model: openai/MiniMax-M3
    temperature: 0.2
    max_tokens: 16384
    extra_body:
      thinking:
        type: adaptive
  - id: p3
    name: Cara
    model: openai/MiniMax-M3
    temperature: 0.7
    max_tokens: 8192
    extra_body:
      thinking:
        type: disabled
  - id: p4
    name: Dan
    model: openai/MiniMax-M3
    temperature: 0.7
    max_tokens: 8192
    extra_body:
      thinking:
        type: disabled
  - id: p5
    name: Eve
    model: openai/MiniMax-M3
    temperature: 0.7
    max_tokens: 8192
    extra_body:
      thinking:
        type: disabled
